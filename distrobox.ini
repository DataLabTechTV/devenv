[devbox]
image=fedora-toolbox:latest
entry=false
nvidia=true

# --- shell basics ---
pre_init_hooks=export SHELL=/usr/bin/fish
pre_init_hooks=dnf copr enable -y atim/starship
additional_packages=fish starship chezmoi direnv fastfetch
additional_packages=zoxide bat ripgrep fd-find
init_hooks=command -v eza >/dev/null 2>&1 || cargo install --root /usr/local eza

# --- general tools ---
additional_packages=ncdu btop prettyping jq yq git-delta

# --- image tools ---
pre_init_hooks=dnf install -y https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
additional_packages=ImageMagick ImageMagick-heic libheif-freeworld libde265
init_hooks=command -v rembg >/dev/null 2>&1 || uv --no-cache tool install --link-mode=copy rembg[gpu,cli]

# --- network tools ---
additional_packages=rclone iperf3 nc mkcert nmap
init_hooks=command -v mc >/dev/null 2>&1 || go install github.com/minio/mc@latest
init_hooks=command -v s5cmd >/dev/null 2>&1 || go install github.com/peak/s5cmd/v2@master
init_hooks=command -v warp >/dev/null 2>&1 || go install github.com/minio/warp@latest
init_hooks=command -v httpie >/dev/null 2>&1 || uv --no-cache tool install --link-mode=copy --with=httpie-aws-authv4 httpie

# --- data tools ---
additional_packages=miller gnuplot
init_hooks=command -v termgraph >/dev/null 2>&1 || uv --no-cache tool install --link-mode=copy termgraph==0.7.4
init_hooks=command -v vd >/dev/null 2>&1 || uv --no-cache tool install --link-mode=copy visidata

# --- ai tools ---
additional_packages=zstd
init_hooks=command -v ollama >/dev/null 2>&1 || curl -fsSL https://ollama.com/download/ollama-linux-amd64.tar.zst | tar x --zstd -C /usr

# --- development basics ---
additional_packages=git just pre-commit cloc neovim
init_hooks=alternatives --install /usr/bin/vim vim /usr/bin/nvim 100
pre_init_hooks=dnf copr enable -y dejan/lazygit
additional_packages=lazygit

# --- container tools ---
additional_packages=docker-cli docker-compose
volume=/run/user/1000/podman/podman.sock:/var/run/docker.sock
init_hooks=command -v lazydocker >/dev/null 2>&1 || go install github.com/jesseduffield/lazydocker@latest
init_hooks=command -v cosign >/dev/null 2>&1 || go install github.com/sigstore/cosign/v3/cmd/cosign@latest

# --- languages: go, rust, python, node ---
additional_packages=golang rust cargo uv nodejs
init_hooks=command -v gopls >/dev/null 2>&1 || go install golang.org/x/tools/gopls@latest

# --- language server protocols: just ---
init_hooks=command -v just-lsp >/dev/null 2>&1 || cargo install --root /usr/local just-lsp

# --- linting: go ---
additional_packages=golangci-lint

# --- web dev: hugo ---
init_hooks=command -v hugo >/dev/null 2>&1 || go install github.com/gohugoio/hugo@v0.111.3

# --- databases: sqlite, duckdb ---
additional_packages=sqlite3
init_hooks=command -v duckdb >/dev/null 2>&1 || curl https://install.duckdb.org | sh
