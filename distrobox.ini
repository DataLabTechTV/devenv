[devbox]
image=fedora-toolbox:latest
entry=false
nvidia=true
volume=./scripts:/scripts
pre_init_hooks=/scripts/pre-init.sh
init_hooks=/scripts/init.sh

# --- languages ---
additional_packages=golang delve gopls golangci-lint cargo uv python3-devel nodejs-npm shfmt ShellCheck

# --- shell ---
additional_packages=fish starship chezmoi direnv fastfetch zoxide bat ripgrep fd-find eza ncdu btop prettyping jq yq

# --- network ---
additional_packages=rclone iperf3 mkcert nc nmap

# --- graphics ---
additional_packages=ImageMagick ImageMagick-heic libheif-freeworld libde265

# --- dev ---
additional_packages=git just pre-commit cloc git-delta lazygit neovim zed
exported_apps=zed

# --- containers ---
additional_packages=docker-cli docker-compose
volume=/run/user/1000/podman/podman.sock:/var/run/docker.sock

# --- ai ---
additional_packages=zstd

# --- data ---
additional_packages=sqlite3 miller gnuplot
